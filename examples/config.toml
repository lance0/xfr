# xfr configuration file
# Place at ~/.config/xfr/config.toml

[client]
# Default test duration in seconds
duration_secs = 10

# Default number of parallel streams
parallel_streams = 1

# Enable TCP_NODELAY by default
tcp_nodelay = false

# Default TCP window size
# window_size = "1M"

# Default to JSON output
json_output = false

# Disable TUI by default
no_tui = false

# Disable the background check for a newer xfr release. Also honored via the
# DO_NOT_TRACK or XFR_NO_UPDATE_CHECK environment variables, the
# --no-update-check flag, or the Update check toggle in the TUI settings.
no_update_check = false

# Omit first N seconds from interval output (TCP ramp-up)
# omit_secs = 3

[server]
# Default port
port = 5201

# Exit after one test
one_off = false

# Disable mDNS service registration
no_mdns = false

# Prometheus metrics port (requires --features prometheus)
# prometheus = 9090

# Server presets - use with: xfr serve --preset limited
[[presets]]
name = "limited"
# bandwidth_limit is reserved for future use and is not enforced today.
bandwidth_limit = "100M"
max_duration_secs = 60

[[presets]]
name = "internal"
allowed_clients = ["192.168.0.0/16", "10.0.0.0/8"]
