name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo-audit
        uses: actions/cache@v6
        with:
          path: ~/.cargo/bin/cargo-audit
          key: cargo-audit-0.21

      - name: Install cargo-audit
        run: command -v cargo-audit || cargo install cargo-audit --locked

      - name: Run security audit
        run: cargo audit

  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64 — static musl (Zig bundles musl); generic Linux + container amd64
          - target: x86_64-unknown-linux-musl
            triple: x86_64-unknown-linux-musl
            os: ubuntu-latest
            tool: zigbuild
          # Linux aarch64 — glibc, floored at 2.17 for old distros/embedded
          - target: aarch64-unknown-linux-gnu
            triple: aarch64-unknown-linux-gnu.2.17
            os: ubuntu-latest
            tool: zigbuild
          # Linux aarch64 — static musl (container arm64)
          - target: aarch64-unknown-linux-musl
            triple: aarch64-unknown-linux-musl
            os: ubuntu-latest
            tool: zigbuild
          # Android aarch64 (Termux) — NDK target, cross from git main
          - target: aarch64-linux-android
            triple: aarch64-linux-android
            os: ubuntu-latest
            tool: cross
          # macOS aarch64 (Apple Silicon) — native
          - target: aarch64-apple-darwin
            triple: aarch64-apple-darwin
            os: macos-latest
            tool: native
          # Note: Intel Mac (x86_64-apple-darwin) removed - users can build from crate

    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry and git
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # zigbuild handles the Linux gnu/musl targets: Zig bundles musl and lets us
      # pin a low glibc floor (.2.17) without stale cross images. Replaces cross
      # 0.2.5, whose old images could not run build scripts under modern Rust
      # (glibc 2.28+ symbol errors on the aarch64 images).
      - name: Install Zig
        if: matrix.tool == 'zigbuild'
        uses: goto-bus-stop/setup-zig@v2

      - name: Install cargo-zigbuild
        if: matrix.tool == 'zigbuild'
        run: cargo install cargo-zigbuild --locked

      # Android is an NDK target zigbuild does not handle; keep cross, but from
      # git main (images track current glibc) rather than the stale 0.2.5.
      - name: Install cross (git main)
        if: matrix.tool == 'cross'
        run: cargo install cross --git https://github.com/cross-rs/cross --locked

      - name: Build (zigbuild)
        if: matrix.tool == 'zigbuild'
        run: cargo zigbuild --release --locked --target ${{ matrix.triple }} --features prometheus

      - name: Build (cross)
        if: matrix.tool == 'cross'
        run: cross build --release --locked --target ${{ matrix.triple }} --features prometheus

      - name: Build (native)
        if: matrix.tool == 'native'
        run: cargo build --release --locked --target ${{ matrix.triple }} --features prometheus

      - name: Package binary
        shell: bash
        run: |
          # zigbuild may emit into the glibc-suffixed target dir; check both.
          for d in "target/${{ matrix.triple }}/release" "target/${{ matrix.target }}/release"; do
            if [[ -f "$d/xfr" ]]; then bindir="$d"; break; fi
          done
          if [[ -z "${bindir:-}" ]]; then
            echo "::error::xfr binary not found under target/*/release"; ls -R target 2>/dev/null | grep -B1 -A3 release | head -40; exit 1
          fi
          echo "packaging from $bindir"
          tar czvf "xfr-${{ matrix.target }}.tar.gz" -C "$bindir" xfr

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: xfr-${{ matrix.target }}
          path: xfr-${{ matrix.target }}.tar.gz

  # Container publish is intentionally NOT a dependency of the `release` job.
  # Binaries + crates.io are the primary release surface, so a GHCR
  # registry/auth/action blip must never block the GitHub release. If this
  # job fails the run still goes red (visible), the release still ships, and
  # the fix is narrow — treat a missing container tag as a recoverable
  # publishing incident and backfill by re-running just this job:
  #   gh run rerun <release-run-id> --job "Publish Container Image (GHCR)"
  docker:
    name: Publish Container Image (GHCR)
    needs: [audit, build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7

      - name: Download Linux musl artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: xfr-*-linux-musl
          path: artifacts

      - name: Stage binaries by Docker architecture
        run: |
          mkdir -p bin/amd64 bin/arm64
          tar xzf artifacts/xfr-x86_64-unknown-linux-musl/xfr-x86_64-unknown-linux-musl.tar.gz -C bin/amd64
          tar xzf artifacts/xfr-aarch64-unknown-linux-musl/xfr-aarch64-unknown-linux-musl.tar.gz -C bin/arm64

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
          labels: |
            org.opencontainers.image.description=Modern network bandwidth testing with TUI - iperf3 replacement

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.release
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # Post-publish verification (NOT a release gate): confirms the just-pushed
  # multi-arch tag is actually pullable, so a "succeeded but incomplete" push
  # fails the run visibly. Depends only on `docker`, never blocks `release`.
  verify-ghcr:
    name: Verify GHCR image
    needs: [docker]
    runs-on: ubuntu-latest
    permissions:
      packages: read
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify multi-arch image is pullable
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          IMG="ghcr.io/${{ github.repository }}:${VERSION}"
          echo "Verifying $IMG"
          docker buildx imagetools inspect "$IMG" | tee manifest.txt
          grep -q "linux/amd64" manifest.txt || { echo "::error::$IMG missing linux/amd64"; exit 1; }
          grep -q "linux/arm64" manifest.txt || { echo "::error::$IMG missing linux/arm64"; exit 1; }
          echo "OK: $IMG published with linux/amd64 + linux/arm64"

  release:
    name: Create Release
    needs: [audit, build, completions]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - name: Generate checksums
        run: |
          cd artifacts
          find . -name "*.tar.gz" -exec mv {} . \;
          sha256sum *.tar.gz > SHA256SUMS
          cat SHA256SUMS
          cd -

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            artifacts/*.tar.gz
            artifacts/SHA256SUMS
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  completions:
    name: Generate Shell Completions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --release --locked --features prometheus

      - name: Generate completions
        run: |
          mkdir -p completions
          ./target/release/xfr --completions bash > completions/xfr.bash
          ./target/release/xfr --completions zsh > completions/_xfr
          ./target/release/xfr --completions fish > completions/xfr.fish
          ./target/release/xfr --completions powershell > completions/_xfr.ps1
          ./target/release/xfr --completions elvish > completions/xfr.elv
          tar czvf completions.tar.gz completions/

      - name: Upload completions
        uses: actions/upload-artifact@v7
        with:
          name: completions
          path: completions.tar.gz
