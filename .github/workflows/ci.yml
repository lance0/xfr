name: CI

on:
  push:
    branches: [master, main]
    paths-ignore:
      - '**/*.md'
  pull_request:
    branches: [master, main]
    paths-ignore:
      - '**/*.md'

# Cancel superseded runs on a branch/PR, but never on master — a release-prep
# push must not be killed by a follow-up commit.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test (${{ matrix.os }}, ${{ matrix.features }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            features: --all-features
          - os: ubuntu-latest
            features: --no-default-features
          - os: macos-latest
            features: --all-features
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run tests
        run: cargo test --locked ${{ matrix.features }}

  clippy:
    name: Clippy (${{ matrix.features }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        features: [--all-features, --no-default-features]
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Clippy
        run: cargo clippy --locked ${{ matrix.features }} --all-targets -- -D warnings

  fmt:
    name: Format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --check

  typos:
    name: Typos
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: crate-ci/typos@v1.48.0

  doc:
    name: Doc (deny rustdoc warnings)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo doc
        run: cargo doc --all-features --no-deps --locked
        env:
          RUSTDOCFLAGS: -D warnings

  windows-check:
    name: Windows cargo check
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Cargo check
        run: cargo check --locked --all-features

  msrv:
    name: MSRV (1.88)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.88
      - uses: Swatinem/rust-cache@v2
      # Compile the tests too (--no-run) so a dependency MSRV bump or a test
      # using an API newer than 1.88 fails here, not only non-test code.
      - name: Build + compile tests on MSRV
        run: cargo test --all-features --no-run --locked

  # Build every shippable release target on each PR (debug, no packaging) with
  # the same toolchains as release.yml, so a target-specific build/link failure
  # is caught before tag. zigbuild covers the Linux gnu/musl targets (Zig bundles
  # musl and pins a low glibc floor) — it replaces cross 0.2.5, whose stale images
  # failed build scripts under modern Rust (glibc 2.28+ symbol errors). Android
  # stays on cross (from git main, current glibc); macOS builds natively.
  cross-smoke:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            triple: x86_64-unknown-linux-musl
            os: ubuntu-latest
            tool: zigbuild
          - target: aarch64-unknown-linux-gnu
            triple: aarch64-unknown-linux-gnu.2.17
            os: ubuntu-latest
            tool: zigbuild
          - target: aarch64-unknown-linux-musl
            triple: aarch64-unknown-linux-musl
            os: ubuntu-latest
            tool: zigbuild
          - target: aarch64-linux-android
            triple: aarch64-linux-android
            os: ubuntu-latest
            tool: cross
          - target: aarch64-apple-darwin
            triple: aarch64-apple-darwin
            os: macos-latest
            tool: native
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Install Zig
        if: matrix.tool == 'zigbuild'
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.16.0
      - name: Install cargo-zigbuild
        if: matrix.tool == 'zigbuild'
        run: cargo install cargo-zigbuild --version 0.23.0 --locked
      - name: Install cross (pinned main commit)
        if: matrix.tool == 'cross'
        run: cargo install cross --git https://github.com/cross-rs/cross --rev 64b5bb4d --locked
      - name: Build (zigbuild)
        if: matrix.tool == 'zigbuild'
        run: cargo zigbuild --target ${{ matrix.triple }} --features prometheus --locked
      - name: Build (cross)
        if: matrix.tool == 'cross'
        run: cross build --target ${{ matrix.triple }} --features prometheus --locked
      - name: Build (native)
        if: matrix.tool == 'native'
        run: cargo build --target ${{ matrix.triple }} --features prometheus --locked
      # ABI check on the zigbuild targets: glibc floor (2.17) for gnu, static
      # for musl. Guards against a build that succeeds but links the wrong ABI.
      - name: Verify binary ABI
        if: matrix.tool == 'zigbuild'
        run: bash scripts/verify-target-binary.sh "${{ matrix.target }}" "${{ matrix.triple }}" debug

  mptcp:
    name: MPTCP (requires kernel MPTCP + netem)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build release binary
        run: cargo build --release --locked
      - name: Run MPTCP namespace tests
        # The script emits a ::warning:: annotation and exits 0 when MPTCP or
        # netem is unavailable, making the skip visible in the PR check UI
        # without failing the job (LAN-174).
        run: sudo ./test-mptcp-ns.sh --ci

  control-channel-skew:
    name: Control-channel skew (#70 regression)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build release binary
        run: cargo build --release --locked
      - name: Verify TCP_NODELAY on control channel under saturated link
        run: sudo ./test-control-channel-skew.sh

  mtu-probe:
    name: MTU probe (#64 netns)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build release binary
        run: cargo build --release --locked
      - name: Probe through a constrained middle hop
        run: sudo ./test-mtu-probe-ns.sh --ci
