name: CI

on:
  push:
    branches: [master, main]
    paths-ignore:
      - '**/*.md'
  pull_request:
    branches: [master, main]
    paths-ignore:
      - '**/*.md'

# Cancel superseded runs on a branch/PR, but never on master — a release-prep
# push must not be killed by a follow-up commit.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test (${{ matrix.os }}, ${{ matrix.features }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            features: --all-features
          - os: ubuntu-latest
            features: --no-default-features
          - os: macos-latest
            features: --all-features
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run tests
        run: cargo test --locked ${{ matrix.features }}

  clippy:
    name: Clippy (${{ matrix.features }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        features: [--all-features, --no-default-features]
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Clippy
        run: cargo clippy --locked ${{ matrix.features }} --all-targets -- -D warnings

  fmt:
    name: Format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --check

  doc:
    name: Doc (deny rustdoc warnings)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo doc
        run: cargo doc --all-features --no-deps --locked
        env:
          RUSTDOCFLAGS: -D warnings

  msrv:
    name: MSRV (1.88)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.88
      - uses: Swatinem/rust-cache@v2
      # Compile the tests too (--no-run) so a dependency MSRV bump or a test
      # using an API newer than 1.88 fails here, not only non-test code.
      - name: Build + compile tests on MSRV
        run: cargo test --all-features --no-run --locked

  # Cross-compile every shippable Linux/Android target on each PR (debug, no
  # packaging). release.yml builds these with an old-glibc cross image; v0.9.15
  # died at release time on a glibc symbol (memfd_create, glibc 2.27+) that
  # linked fine on the ubuntu/macos test jobs. Same pinned cross version as
  # release.yml so the toolchain (and its glibc) match — linking is what catches
  # missing symbols. aarch64-apple-darwin is already built by the macOS test job.
  cross-smoke:
    name: Cross build (${{ matrix.target }})
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-gnu
          - aarch64-unknown-linux-musl
          - aarch64-linux-android
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross@0.2.5
      - name: Cross build
        run: cross build --target ${{ matrix.target }} --features prometheus --locked

  mptcp:
    name: MPTCP (requires kernel MPTCP + netem)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build release binary
        run: cargo build --release --locked
      - name: Run MPTCP namespace tests
        # The script emits a ::warning:: annotation and exits 0 when MPTCP or
        # netem is unavailable, making the skip visible in the PR check UI
        # without failing the job (LAN-174).
        run: sudo ./test-mptcp-ns.sh --ci

  control-channel-skew:
    name: Control-channel skew (#70 regression)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build release binary
        run: cargo build --release --locked
      - name: Verify TCP_NODELAY on control channel under saturated link
        run: sudo ./test-control-channel-skew.sh

  mtu-probe:
    name: MTU probe (#64 netns)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build release binary
        run: cargo build --release --locked
      - name: Probe through a constrained middle hop
        run: sudo ./test-mtu-probe-ns.sh --ci
