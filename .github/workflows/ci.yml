name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run tests (Linux)
        if: runner.os == 'Linux'
        run: cargo test --all-features
      - name: Run tests (macOS)
        if: runner.os == 'macOS'
        run: cargo test --features discovery,prometheus

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Clippy
        run: cargo clippy --all-features -- -D warnings

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --check

  mptcp:
    name: MPTCP
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build release binary
        run: cargo build --release
      - name: Run MPTCP namespace tests
        run: sudo ./test-mptcp-ns.sh --ci

  control-channel-skew:
    name: Control-channel skew (#70 regression)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build release binary
        run: cargo build --release
      - name: Verify TCP_NODELAY on control channel under saturated link
        run: sudo ./test-control-channel-skew.sh

  msrv:
    name: MSRV (1.88)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.88
      - uses: Swatinem/rust-cache@v2
      - name: Check MSRV
        run: cargo check --all-features

  mtu-probe:
    name: MTU probe (#64 netns)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build release binary
        run: cargo build --release
      - name: Probe through a constrained middle hop
        run: sudo ./test-mtu-probe-ns.sh --ci

  # The release workflow cross-compiles aarch64-unknown-linux-gnu with an
  # old-glibc toolchain that the ubuntu/macos test jobs never exercise.
  # v0.9.15 died at release time on a glibc symbol (memfd_create, glibc
  # 2.27+) that linked fine everywhere else. Same pinned cross version as
  # release.yml so the Docker image (and its glibc) match; debug profile is
  # enough — linking is what catches missing symbols.
  cross-aarch64-gnu:
    name: Cross build (aarch64-gnu, release-toolchain glibc)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cross
        run: cargo install cross --version 0.2.5
      - name: Cross build
        run: cross build --target aarch64-unknown-linux-gnu --features prometheus
